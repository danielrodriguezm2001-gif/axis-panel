<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Axis · Panel de salas</title>
<style>
  html, body { margin: 0; padding: 0; background: #F4F7F5; }
</style>
</head>
<body>
<div id="root">
  <p style="font-family: sans-serif; padding: 24px; color: #5A6B63;">Cargando el panel…</p>
</div>

<!-- React 18 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Google Identity Services: necesario para el botón "Conectar con Google
     Calendar" de gcal.js. Sin esto, gcal.js se queda esperando para siempre. -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- El panel (horarios, sesiones, equipo...) -->
<script src="panel.js?v=1"></script>

<!-- Integración de Google Calendar: añade el widget flotante de "Conectar"
     y el autoenvío de invitaciones por coach. Va DESPUÉS de panel.js
     porque lee/escribe las mismas claves de localStorage que usa el panel. -->
<script src="gcal.js?v=1"></script>
</body>
</html>
